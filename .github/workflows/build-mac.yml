name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Base version tag (the macOS release will be tag-mac)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run dist:mac

      - name: Zip app bundle
        run: |
          cd release
          zip -r -y "BetTracker-darwin-universal.zip" "Bet Tracker-darwin-universal"

      - uses: actions/upload-artifact@v4
        with:
          name: BetTracker-macOS
          path: release/BetTracker-darwin-universal.zip

      - name: Publish macOS Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ (github.event.inputs.tag || github.ref_name) }}-mac
          name: Bet Tracker ${{ github.event.inputs.tag || github.ref_name }} (macOS)
          files: release/BetTracker-darwin-universal.zip
